<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schach Grundlagen Tutorial</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .board { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; }
        .square { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .white { background-color: #fff; }
        .black { background-color: #000; color: #fff; }
        .piece { font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<h1>Schach Grundlagen Tutorial</h1>
<p>Hier lernst du die Grundzüge des Schachspiels!</p>

<h2>Schachbrett</h2>
<div class="board" id="chessboard"></div>

<h2>Schachfiguren</h2>
<p>Die Figuren sind:</p>
<ul>
    <li>♔ König</li>
    <li>♕ Dame</li>
    <li>♖ Turm</li>
    <li>♗ Läufer</li>
    <li>♘ Springer</li>
    <li>♙ Bauer</li>
</ul>

<h2>Bewege die Figuren</h2>
<p>Klicke auf eine Figur, um sie zu bewegen!</p>

<script>
    const board = document.getElementById('chessboard');
    const pieces = [
        '♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖',
        '♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙',
        '', '', '', '', '', '', '', '',
        '', '', '', '', '', '', '', '',
        '', '', '', '', '', '', '', '',
        '', '', '', '', '', '', '', '',
        '♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟',
        '♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜'
    ];
    
    // Erstelle das Schachbrett
    function createBoard() {
        for (let i = 0; i < 64; i++) {
            const square = document.createElement('div');
            square.className = (Math.floor(i / 8) + i) % 2 === 0 ? 'square white' : 'square black';
            square.innerHTML = pieces[i] ? `<span class="piece">${pieces[i]}</span>` : '';
            square.addEventListener('click', () => selectPiece(i));
            board.appendChild(square);
        }
    }

    let selectedPiece = null;

    // Funktion zum Auswählen einer Figur
    function selectPiece(index) {
        const piece = pieces[index];
        if (piece) {
            if (selectedPiece === null) {
                selectedPiece = index;
                alert(`Du hast die Figur ${piece} ausgewählt!`);
            } else {
                alert(`Du hast die Figur ${pieces[selectedPiece]} bewegt!`);
                selectedPiece = null; // Zurücksetzen
            }
        } else {
            if (selectedPiece !== null) {
                alert(`Du hast eine leere Felder ausgewählt!`);
                selectedPiece = null; // Zurücksetzen
            }
        }
    }

    createBoard();
</script>

</body>
</html>
