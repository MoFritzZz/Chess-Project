<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://img.icons8.com/color/512/chess-com.png">
<link rel="stylesheet" href="styleChessBoard.css">
<script src= "scriptChessBoard.js"></script>
<title>Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<body id="page-top">
    <div id="loader">
      <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    <div id="top"></div>
<!-- Title: fixed top-right, outside scaler -->
<a class="mainfont" href="index.html">ChessHelper</a>

<!-- Everything inside here gets scaled to fit the viewport -->
<div id="game-scaler">
  <div class="game-layout">

    <!-- Board Column -->
    <div class="board-column">
      <div class="player-bar" id="black-bar">
        <div class="avatar">♟</div>
        <div>
          <div class="name">Schwarz</div>
          <div class="rating">Spieler 2</div>
        </div>
        <div class="captured-pieces" id="black-captured"></div>
        <span class="score-diff" id="black-score"></span>
      </div>

      <div class="board-wrapper">
        <div class="board-frame">
          <div id="board"></div>
        </div>
      </div>

      <div class="player-bar active-player" id="white-bar">
        <div class="avatar">♙</div>
        <div>
          <div class="name">Weiß</div>
          <div class="rating">Spieler 1</div>
        </div>
        <div class="captured-pieces" id="white-captured"></div>
        <span class="score-diff" id="white-score"></span>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">

      <div class="panel-box">
        <div id="status-box">
          <div id="turn-indicator">
            <div id="turn-dot"></div>
            <span id="turn-text">Weiß am Zug</span>
          </div>
          <div id="game-message"></div>
        </div>
      </div>

      <div class="panel-box" style="flex:1">
        <div class="panel-title">Zughistorie</div>
        <div id="move-list-container">
          <div id="move-list"></div>
        </div>
        <div class="nav-row">
          <button class="nav-btn" onclick="navigateMove('first')" title="Anfang">⏮</button>
          <button class="nav-btn" onclick="navigateMove('prev')"  title="Zurück">◀</button>
          <button class="nav-btn" onclick="navigateMove('next')"  title="Vor">▶</button>
          <button class="nav-btn" onclick="navigateMove('last')"  title="Ende">⏭</button>
        </div>
      </div>

      <div class="panel-box">
        <div class="btn-row">
          <button class="btn btn-primary"   onclick="newGame()">Neues Spiel</button>
          <button class="btn btn-secondary" onclick="flipBoard()">Board Drehen</button>
        </div>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-secondary" id="btn-ai" onclick="toggleAI()">You vs KI</button>
          <span id="ai-status" style="font-size:13px;color:#888;line-height:36px;padding-left:8px;"></span>
        </div>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-secondary" onclick="saveGame()" title="Spiel im JSON-Server speichern">Speichern</button>
          <button class="btn btn-secondary" onclick="listGames()" title="Gespeicherte Spiele laden">Laden</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Promotion overlay (outside scaler so it covers full screen) -->
<div id="promotion-overlay">
  <div class="promotion-box">
    <h3>Bauernumwandlung</h3>
    <div class="promotion-pieces" id="promo-pieces"></div>
  </div>
</div>

<!-- Game over overlay -->
<div id="gameover-overlay">
  <div class="gameover-box">
    <div class="result-icon" id="result-icon"></div>
    <h2 id="result-title"></h2>
    <p id="result-desc"></p>
    <button class="btn btn-primary" onclick="newGame()" style="width:100%; padding:12px;">Neues Spiel</button>
  </div>
</div>
</div>
<script src="scriptsOther.js"></script>
<script src="api.js"></script>
<script>
  newGame();
</script>
</body>
</html>
